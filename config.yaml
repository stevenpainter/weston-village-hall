baseURL: "https://westonparishnotts.org.uk"
languageCode: "en-GB"
title: "Weston Village Hall"

disableKinds:
  - taxonomy
  - term

params:
  description: "Weston Village Hall — a community venue for hire in Weston, Nottinghamshire."
  contactEmail: "WestonVillageHall1736@gmail.com"
  bookingContactName: "Cate Powell"
  bookingEmail: "kpcep123@gmail.com"
  bookingPhone: "07890 806894"
  facebook: "Weston Village Hall NG23 6ST"
  facebookUrl: "" # TODO: add the real Facebook page URL
  instagram: "weston_village_hall_ng23"
  instagramUrl: "https://www.instagram.com/weston_village_hall_ng23/"
  address: "Main Street, Weston, Newark, Nottinghamshire NG23 6ST"
  sanityProjectId: "5ghzoo6a"
  sanityDataset: "production"

# Content is fetched fresh from Sanity on every build (see partials/sanity-data.html),
# so remote resources must not be cached across builds — otherwise a Sanity publish
# webhook would trigger a rebuild that just re-serves stale cached content.
caches:
  getresource:
    maxAge: "1s"

outputs:
  home:
    - HTML
    - RSS

pagination:
  pagerSize: 10

markup:
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - name: Home
      url: /
      weight: 1
    - name: About
      url: /about/
      weight: 2
    - name: Facilities
      url: /facilities/
      weight: 3
    - name: Events
      url: /events/
      weight: 4
    - name: Contact
      url: /contact/
      weight: 5
