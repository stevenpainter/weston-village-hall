{{ define "main" }}

  <header class="page-header">
    <h1>{{ .Title }}</h1>
  </header>

  <div class="home-hero">
    <div class="prose">
      {{ .Content }}
    </div>
    {{ with .Params.image }}
      <img class="home-hero__img" src="{{ . }}" alt="{{ $.Params.image_alt }}">
    {{ end }}
  </div>

{{ end }}
