{{ define "main" }}

  {{ $data := partial "sanity-data.html" . }}
  {{ $page := $data.home }}

  <header class="page-header">
    <h1>{{ $page.title }}</h1>
  </header>

  <div class="home-hero">
    <div class="prose">
      {{ $page.body | markdownify }}
    </div>
    {{ with $page.heroImageUrl }}
      <img class="home-hero__img" src="{{ . }}" alt="{{ $page.heroImageAlt }}">
    {{ end }}
  </div>

{{ end }}
