backend:
  name: github
  repo: stevenpainter/weston-village-hall
  branch: main

# Where editors upload images and PDFs
media_folder: static/uploads
public_folder: /uploads

# Show a live preview of content as it's being edited
show_preview_links: true

collections:

  # ══════════════════════════════════════════════════════════════
  # EVENTS — editors can create, edit, and delete individual events
  # ══════════════════════════════════════════════════════════════

  - name: events
    label: Events
    label_singular: Event
    folder: content/events
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: Event Title,         name: title,      widget: string }
      - { label: Start Date & Time,   name: date,       widget: datetime }
      - { label: End Date & Time,     name: end_date,   widget: datetime, required: false }
      - label: Event Type
        name: event_type
        widget: select
        options:
          - Coffee Morning
          - Quiz Night
          - Pub Night
          - Exercise Class
          - Craft Group
          - Private Hire
          - Other
      - { label: Description,         name: body,       widget: markdown }
      - { label: Contact / Booking,   name: contact,    widget: string,   required: false,
          hint: "Email address or phone number for bookings or enquiries." }
      - { label: Image,               name: image,      widget: image,    required: false }

  # ══════════════════════════════════════════════════════════════
  # PAGES — editors update existing pages, cannot create new ones
  # ══════════════════════════════════════════════════════════════

  - name: pages
    label: Pages
    files:

      - name: home
        label: Home Page
        file: content/_index.md
        fields:
          - { label: Page title, name: title, widget: string }
          - { label: Body,       name: body,  widget: markdown }

      - name: about
        label: About
        file: content/about.md
        fields:
          - { label: Page title, name: title, widget: string }
          - { label: Body,       name: body,  widget: markdown }

      - name: facilities
        label: Facilities & Hire Rates
        file: content/facilities.md
        fields:
          - { label: Page title, name: title, widget: string }
          - { label: Body,       name: body,  widget: markdown }

      - name: contact
        label: Contact & Bookings
        file: content/contact.md
        fields:
          - { label: Page title, name: title, widget: string }
          - { label: Body,       name: body,  widget: markdown }

      - name: events_intro
        label: Events — Regular Activities
        file: content/events/_index.md
        fields:
          - { label: Page title, name: title, widget: string }
          - { label: Intro text, name: intro, widget: markdown,
              hint: "Describe regular weekly or monthly activities here. One-off events are managed separately under Events." }
          - label: Regular Activities
            name: activities
            widget: list
            fields:
              - { label: Activity name, name: name,     widget: string }
              - { label: Schedule,      name: schedule, widget: string,
                  hint: "e.g. Every Tuesday, 10am–12pm" }
              - { label: Cost,          name: cost,     widget: string, required: false }
              - { label: Description,   name: body,     widget: markdown, required: false }
