# Cloudflare Pages build configuration
# Set these in the Cloudflare dashboard under Settings > Builds & deployments
#
# Response headers (security headers, cache-control) are NOT read from this
# file — Cloudflare Pages does not support a TOML headers config. They live
# in static/_headers (Netlify-style syntax), which Hugo copies into public/
# on build.

[build]
  command = "hugo --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.147.0"
  HUGO_ENV = "production"
